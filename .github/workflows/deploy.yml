name: Deploy to GitHub Pages

on:
  push:
    branches: [master, Multipage-Light]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for GitHub Pages
        run: pnpm --filter @workspace/lai-design run build:pages

      - name: List build output
        run: ls -la artifacts/lai-design/dist/public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/lai-design/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
